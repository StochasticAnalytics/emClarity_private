[tool:pytest]
# Pytest configuration for emClarity Python tests

# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Exclude problematic directories for now
norecursedirs = gui

# Output options
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --ignore=gui/

# Markers for test categorization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    gpu: marks tests as requiring GPU (deselect with '-m "not gpu"')
    cuda: marks tests as requiring CUDA (deselect with '-m "not cuda"')
    gui: marks tests as requiring GUI/display (deselect with '-m "not gui"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    known_failure: marks tests with known issues (deselect with '-m "not known_failure"')

# Coverage options
# (when using --cov flag)
[tool:coverage:run]
source = .
omit = 
    */tests/*
    */test_*
    setup.py
    */__pycache__/*
    */.*
    gui/*

[tool:coverage:report]
# Regexes for lines to exclude from consideration
exclude_lines =
    # Have to re-enable the standard pragma
    pragma: no cover

    # Don't complain about missing debug-only code:
    def __repr__
    if self\.debug

    # Don't complain if tests don't hit defensive assertion code:
    raise AssertionError
    raise NotImplementedError

    # Don't complain if non-runnable code isn't run:
    if 0:
    if __name__ == .__main__.:

    # Don't complain about abstract methods
    @(abc\.)?abstractmethod

ignore_errors = True
skip_covered = False
show_missing = True

[tool:coverage:html]
directory = htmlcov

[tool:coverage:xml]
output = coverage.xml
