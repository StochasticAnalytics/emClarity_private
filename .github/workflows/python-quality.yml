name: Python Code Quality

on:
  push:
    branches:
      - main
      - '*_ci'
    paths:
      - 'python/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/python-quality.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'python/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/python-quality.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # Match project target
        
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pyright bandit[toml] safety
        
    - name: Run Ruff linting
      run: |
        echo "::group::Ruff Check"
        ruff check python/ --output-format=github
        echo "::endgroup::"
        
    - name: Run Ruff formatting check
      run: |
        echo "::group::Ruff Format Check"
        ruff format --check --diff python/
        echo "::endgroup::"
        
    - name: Run type checking with Pyright
      run: |
        echo "::group::Type Checking"
        pyright python/
        echo "::endgroup::"
        
    - name: Run security checks with Bandit
      run: |
        echo "::group::Security Checks"
        bandit -r python/ -f json -o bandit-report.json || true
        bandit -r python/ -f txt
        echo "::endgroup::"
        
    - name: Run dependency vulnerability scan
      run: |
        echo "::group::Dependency Security"
        safety check --json --output safety-report.json || true
        safety check
        echo "::endgroup::"
        
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json
        retention-days: 30

  # Optional: Add a job that can auto-fix issues on CI branches
  auto-fix:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && endsWith(github.ref_name, '_ci') && github.actor == 'github-actions[bot]'
    needs: code-quality
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Ruff
      run: pip install ruff
      
    - name: Auto-fix with Ruff
      run: |
        ruff check python/ --fix
        ruff format python/
        
    - name: Commit fixes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add python/
        git diff --staged --quiet || git commit -m "Auto-fix: Apply Ruff formatting and linting fixes"
        git push
