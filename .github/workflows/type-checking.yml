name: Type Checking

on:
  push:
    branches:
      - main
      - '*_ci'  # CI branches for testing workflows
    paths:
      # Only run when Python code or type config changes
      - 'python/**'                              # Any Python files
      - 'pyproject.toml'                         # Pyright configuration  
      - '.github/workflows/type-checking.yml'   # This workflow file
  pull_request:
    branches:
      - main
    paths:
      # Same path filters for PRs - efficiency over completeness
      - 'python/**'
      - 'pyproject.toml'
      - '.github/workflows/type-checking.yml'
  workflow_dispatch:  # Allow manual trigger regardless of paths

jobs:
  type-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pyright-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pyright-
          
    - name: Install Pyright
      run: python -m pip install --upgrade pip pyright
        
    - name: Run type checking
      run: |
        echo "::group::Type Checking with Pyright"
        pyright python/
        echo "::endgroup::"
