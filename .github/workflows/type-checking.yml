name: Type Checking

on:
  push:
    branches:
      - main
      - '*_ci'
    paths:
      - 'python/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/type-checking.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'python/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/type-checking.yml'
  workflow_dispatch:

jobs:
  type-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pyright-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pyright-
          
    - name: Install Pyright
      run: python -m pip install --upgrade pip pyright
        
    - name: Run type checking
      run: |
        echo "::group::Type Checking with Pyright"
        pyright python/
        echo "::endgroup::"
