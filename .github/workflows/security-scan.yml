name: Security Scan

on:
  push:
    branches:
      - main
      - '*_ci'  # Include CI branches for security validation
    paths:
      # Run when code or dependencies change that could affect security
      - 'python/**/*.py'                       # Python source files
      - 'pyproject.toml'                       # Project configuration
      - 'requirements*.txt'                    # Dependency files
      - '.github/workflows/security-scan.yml' # This workflow file
  pull_request:
    branches:
      - main
    paths:
      # Same efficient filtering for PRs
      - 'python/**/*.py'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - '.github/workflows/security-scan.yml'
  workflow_dispatch:  # Manual security scans always allowed
  schedule:
    # Weekly security audit regardless of code changes
    - cron: '0 9 * * 1'  # Mondays at 9 AM UTC

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-security-${{ hashFiles('pyproject.toml', 'python/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-security-
          
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit[toml] safety
        
    - name: Run code security scan with Bandit
      run: |
        echo "::group::Code Security Analysis"
        bandit -r python/ -f json -o bandit-report.json || true
        bandit -r python/ -f txt
        echo "::endgroup::"
        
    - name: Run dependency vulnerability scan
      run: |
        echo "::group::Dependency Vulnerability Scan"
        safety check --json --output safety-report.json || true
        safety check
        echo "::endgroup::"
        
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports-${{ github.run_number }}
        path: |
          bandit-report.json
          safety-report.json
        retention-days: 90  # Keep security reports longer

    - name: Create security summary
      if: always()
      run: |
        echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "### Bandit (Code Security)" >> $GITHUB_STEP_SUMMARY
        if [ -f bandit-report.json ]; then
          echo "✅ Bandit scan completed - check artifacts for details" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Bandit scan failed" >> $GITHUB_STEP_SUMMARY
        fi
        echo "### Safety (Dependencies)" >> $GITHUB_STEP_SUMMARY
        if [ -f safety-report.json ]; then
          echo "✅ Safety scan completed - check artifacts for details" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Safety scan failed" >> $GITHUB_STEP_SUMMARY
        fi
