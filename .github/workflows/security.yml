name: Security Scan

on:
  push:
    branches: [ main, ctf3d_work ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

jobs:
  security:
    runs-on: ubuntu-20.04
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit semgrep
        cd python
        pip install -r requirements.txt || echo "Some requirements failed - continuing"

    - name: Run Safety (dependency vulnerability scan)
      run: |
        cd python
        echo "Scanning for known security vulnerabilities in dependencies..."
        safety check --json --output safety-report.json || true
        cat safety-report.json || echo "No safety report generated"

    - name: Run Bandit (code security scan)
      run: |
        cd python
        echo "Scanning code for security issues..."
        bandit -r . -f json -o bandit-report.json || true
        cat bandit-report.json || echo "No bandit report generated"

    - name: Run Semgrep (static analysis)
      run: |
        cd python
        echo "Running static analysis with Semgrep..."
        semgrep --config=auto --json --output=semgrep-report.json . || true
        cat semgrep-report.json || echo "No semgrep report generated"

    - name: Upload security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          python/safety-report.json
          python/bandit-report.json
          python/semgrep-report.json
