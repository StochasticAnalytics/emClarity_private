name: Code Style

on:
  push:
    branches:
      - main
      - '*_ci'
    paths:
      - 'python/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/code-style.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'python/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/code-style.yml'
  workflow_dispatch:

jobs:
  style-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-ruff-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-ruff-
          
    - name: Install Ruff
      run: python -m pip install --upgrade pip ruff
        
    - name: Run Ruff linting
      run: |
        echo "::group::Ruff Linting"
        ruff check python/ --output-format=github
        echo "::endgroup::"
        
    - name: Run Ruff formatting check
      run: |
        echo "::group::Ruff Formatting"
        ruff format --check --diff python/
        echo "::endgroup::"

  # Auto-fix for CI branches
  auto-fix:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && endsWith(github.ref_name, '_ci')
    needs: style-check
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Ruff
      run: pip install ruff
      
    - name: Auto-fix with Ruff
      run: |
        ruff check python/ --fix
        ruff format python/
        
    - name: Commit fixes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add python/
        git diff --staged --quiet || git commit -m "Auto-fix: Apply Ruff formatting and linting fixes"
        git push
