name: Code Style

on:
  push:
    branches:
      - main
      - '*_ci'  # CI branches automatically get style fixes applied
    paths:
      # Only run when Python code or style config changes
      - 'python/**/*.py'                      # Python source files only
      - 'pyproject.toml'                      # Ruff configuration
      - '.github/workflows/code-style.yml'   # This workflow file
  pull_request:
    branches:
      - main
    paths:
      # Same path filters for PRs to avoid unnecessary runs
      - 'python/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/code-style.yml'
  workflow_dispatch:  # Manual trigger bypasses path restrictionsn:
  push:
    branches:
      - main
      - '*_ci'
    paths:
      - 'python/**'
      - 'pyproject.toml'
      - '.github/workflows/code-style.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'python/**'
      - 'pyproject.toml'
      - '.github/workflows/code-style.yml'
  # Always run on CI branches regardless of file changes
  workflow_dispatch:

jobs:
  style-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # Match project target version
        
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-ruff-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-ruff-
          
    - name: Install Ruff
      run: python -m pip install --upgrade pip ruff
        
    - name: Run Ruff linting
      run: |
        echo "::group::Ruff Linting"
        ruff check python/ --output-format=github  # GitHub annotations
        echo "::endgroup::"
        
    - name: Run Ruff formatting check
      run: |
        echo "::group::Ruff Formatting"
        ruff format --check --diff python/  # Show what would change
        echo "::endgroup::"

  # Auto-fix for CI branches - helps maintain code quality automatically
  auto-fix:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && endsWith(github.ref_name, '_ci')
    needs: style-check  # Only run if style check completes
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Ruff
      run: pip install ruff
      
    - name: Auto-fix with Ruff
      run: |
        ruff check python/ --fix    # Fix what can be auto-fixed
        ruff format python/         # Apply consistent formatting
        
    - name: Commit fixes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add python/
        git diff --staged --quiet || git commit -m "Auto-fix: Apply Ruff formatting and linting fixes"
        git push
